name: Test

'on':
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-latest
          - name: Windows x64
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache native binaries
        uses: actions/cache@v6
        with:
          # The crate downloads the pinned prebuilt openDAQ libraries into the
          # per-user cache on first use; cache them across runs.
          path: |
            ~/.cache/opendaq-rs
            ~\AppData\Local\opendaq-rs\cache
          key: native-${{ runner.os }}-${{ hashFiles('src/native_manifest.rs') }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test -- --test-threads=4

      - name: Build examples
        run: cargo build --examples

  check-generated:
    name: Generated bindings are in sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Read pinned openDAQ source
        id: pin
        shell: bash
        run: |
          repo="$(awk '/^OPENDAQ_REPO_URL[[:space:]]*\?=/{print $3; exit}' Makefile)"
          ref="$(awk '/^OPENDAQ_REF[[:space:]]*\?=/{print $3; exit}' Makefile)"
          echo "repo=$repo" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Fetch the pinned C headers (sparse)
        shell: bash
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            --branch "${{ steps.pin.outputs.ref }}" \
            "${{ steps.pin.outputs.repo }}" tmp/openDAQ
          git -C tmp/openDAQ sparse-checkout set bindings/c/include

      - name: Regenerate bindings
        run: python3 tools/generate_bindings.py --opendaq-repo tmp/openDAQ

      - name: Verify no differences
        run: git diff --exit-code -- src/sys/generated.rs src/generated
