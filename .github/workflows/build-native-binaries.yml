name: Build native binaries

# Builds the openDAQ native libraries (core + flat C bindings + reference
# modules) for every supported platform, publishes them as release assets,
# regenerates the Rust bindings from the same source, and commits the updated
# pin in src/native_manifest.rs.  Adapted from cl-opendaq's workflow of the
# same name.

'on':
  workflow_dispatch:
    inputs:
      opendaq_repo:
        description: "openDAQ repository URL to build from. Leave empty to use OPENDAQ_REPO_URL from Makefile."
        required: false
        type: string
      opendaq_ref:
        description: "openDAQ ref to build. Leave empty to use OPENDAQ_REF from Makefile."
        required: false
        type: string
      artifact_retention_days:
        description: "Artifact retention in days"
        required: false
        default: 7
        type: number

permissions:
  contents: write

env:
  OPENDAQ_SOURCE_DIR: tmp/openDAQ
  OPENDAQ_BUILD_DIR: tmp/build
  OPENDAQ_CMAKE_ARGS: >-
    -DOPENDAQ_GENERATE_C_BINDINGS=ON
    -DOPENDAQ_GENERATE_PYTHON_BINDINGS=OFF
    -DOPENDAQ_GENERATE_DELPHI_BINDINGS=OFF
    -DOPENDAQ_GENERATE_CSHARP_BINDINGS=OFF
    -DDAQMODULES_REF_DEVICE_MODULE=ON
    -DDAQMODULES_REF_FB_MODULE=ON
    -DDAQMODULES_REF_FB_MODULE_ENABLE_RENDERER=OFF
    -DOPENDAQ_ENABLE_TESTS=OFF
    -DOPENDAQ_ENABLE_TEST_UTILS=OFF
    -DOPENDAQ_ENABLE_ACCESS_CONTROL=OFF
    -DOPENDAQ_ENABLE_NATIVE_STREAMING=ON
    -DDAQMODULES_OPENDAQ_CLIENT_MODULE=ON
    -DBOOST_LOCALE_ENABLE_ICU=OFF

jobs:
  resolve-ref:
    name: Resolve openDAQ source
    runs-on: ubuntu-latest
    outputs:
      repo: ${{ steps.resolve-ref.outputs.repo }}
      value: ${{ steps.resolve-ref.outputs.value }}
      sha: ${{ steps.resolve-ref.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve openDAQ repo and ref
        id: resolve-ref
        shell: bash
        env:
          INPUT_OPENDAQ_REPO: ${{ inputs.opendaq_repo }}
          INPUT_OPENDAQ_REF: ${{ inputs.opendaq_ref }}
        run: |
          if [ -n "$INPUT_OPENDAQ_REPO" ]; then
            repo="$INPUT_OPENDAQ_REPO"
          else
            repo="$(awk '/^OPENDAQ_REPO_URL[[:space:]]*\?=/{print $3; exit}' Makefile)"
          fi
          if [ -z "$repo" ]; then
            echo "Failed to resolve OPENDAQ_REPO_URL from workflow input or Makefile." >&2
            exit 1
          fi

          if [ -n "$INPUT_OPENDAQ_REF" ]; then
            ref="$INPUT_OPENDAQ_REF"
          else
            ref="$(awk '/^OPENDAQ_REF[[:space:]]*\?=/{print $3; exit}' Makefile)"
          fi
          if [ -z "$ref" ]; then
            echo "Failed to resolve OPENDAQ_REF from workflow input or Makefile." >&2
            exit 1
          fi

          sha="$(git ls-remote "$repo" "refs/heads/$ref" "refs/tags/$ref" | head -n1 | cut -f1)"
          if [ -z "$sha" ]; then
            # The ref is not a branch or tag; assume it is a raw commit sha.
            sha="$ref"
          fi

          echo "repo=$repo" >> "$GITHUB_OUTPUT"
          echo "value=$ref" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: resolve-ref
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-22.04
            runtime_triple: linux-x64
            cmake_generator: Ninja
            cmake_extra_args: ""
          - name: macOS arm64
            runner: macos-15
            runtime_triple: darwin-arm64
            cmake_generator: Ninja
            cmake_extra_args: "-DCMAKE_OSX_DEPLOYMENT_TARGET=10.15"
          - name: Windows x64
            runner: windows-2022
            runtime_triple: windows-x64
            cmake_generator: Visual Studio 17 2022
            cmake_extra_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Set up Ninja
        if: matrix.cmake_generator == 'Ninja'
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Clone openDAQ
        shell: bash
        run: |
          rm -rf "$OPENDAQ_SOURCE_DIR" "$OPENDAQ_BUILD_DIR"
          mkdir -p "$(dirname "$OPENDAQ_SOURCE_DIR")" "$(dirname "$OPENDAQ_BUILD_DIR")"
          git clone "${{ needs.resolve-ref.outputs.repo }}" "$OPENDAQ_SOURCE_DIR"
          git -C "$OPENDAQ_SOURCE_DIR" checkout --force "${{ needs.resolve-ref.outputs.value }}"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            $(tr '\n' ' ' < "$OPENDAQ_SOURCE_DIR/.github/packages/apt.txt")

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install mono ninja

      - name: Configure build
        shell: bash
        run: |
          cmake -S "$OPENDAQ_SOURCE_DIR" -B "$OPENDAQ_BUILD_DIR" \
            -G "${{ matrix.cmake_generator }}" \
            -DCMAKE_BUILD_TYPE=Release \
            $OPENDAQ_CMAKE_ARGS \
            ${{ matrix.cmake_extra_args }}

      - name: Build binaries
        shell: bash
        run: cmake --build "$OPENDAQ_BUILD_DIR" --config Release

      - name: Regenerate Rust bindings
        if: runner.os == 'Linux'
        shell: bash
        run: python3 tools/generate_bindings.py --opendaq-repo "$OPENDAQ_SOURCE_DIR"

      - name: Stage artifact
        id: stage
        shell: bash
        run: |
          stage_root="artifacts"
          rm -rf "$stage_root"
          stage_dir="$stage_root/bin/${{ matrix.runtime_triple }}"
          mkdir -p "$stage_dir"

          case "${{ matrix.runtime_triple }}" in
            linux-*)
              extension_regex='\.so$'
              ;;
            darwin-*)
              extension_regex='(\.dylib|\.so)$'
              ;;
            windows-*)
              extension_regex='\.dll$'
              ;;
            *)
              echo "Unsupported runtime triple: ${{ matrix.runtime_triple }}" >&2
              exit 1
              ;;
          esac

          library_list="tmp/runtime-library-list.txt"
          find "$OPENDAQ_BUILD_DIR" -type f -path '*/bin/*' \
            ! -name 'opendaq.cpython*' \
            ! -name '*_test_dll.so' \
            | grep -E "$extension_regex" > "$library_list" || true

          if [ ! -s "$library_list" ]; then
            echo "No runtime libraries were found under $OPENDAQ_BUILD_DIR." >&2
            exit 1
          fi

          while IFS= read -r library; do
            cp "$library" "$stage_dir/"
          done < "$library_list"

          for stem in daqcoretypes daqcoreobjects opendaq copendaq; do
            if ! find "$stage_dir" -maxdepth 1 -type f -name "*${stem}*" | grep -q .; then
              echo "Missing expected runtime library matching *${stem}* in $stage_dir." >&2
              exit 1
            fi
          done

          echo "artifact-root=$stage_root" >> "$GITHUB_OUTPUT"
          find "$stage_root" -maxdepth 3 -type f | sort

      - name: Stage generated bindings
        if: runner.os == 'Linux'
        shell: bash
        run: |
          generated_dir="${{ steps.stage.outputs.artifact-root }}/generated"
          mkdir -p "$generated_dir/src"
          cp -a src/generated "$generated_dir/src/"
          cp src/sys/generated.rs "$generated_dir/sys-generated.rs"
          find "$generated_dir" -type f | sort

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opendaq-native-${{ matrix.runtime_triple }}
          path: ${{ steps.stage.outputs.artifact-root }}
          retention-days: ${{ inputs.artifact_retention_days }}

  publish:
    name: Publish release binaries and commit manifest
    runs-on: ubuntu-latest
    needs:
      - resolve-ref
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: opendaq-native-*
          merge-multiple: true
          path: staged-artifacts

      - name: Pack release archives and write manifest
        id: pack
        shell: bash
        env:
          OPENDAQ_REPO: ${{ needs.resolve-ref.outputs.repo }}
          OPENDAQ_REF: ${{ needs.resolve-ref.outputs.value }}
          OPENDAQ_SHA: ${{ needs.resolve-ref.outputs.sha }}
        run: |
          for runtime_dir in linux-x64 darwin-arm64 windows-x64; do
            if [ ! -d "staged-artifacts/bin/$runtime_dir" ]; then
              echo "Missing downloaded runtime directory bin/$runtime_dir." >&2
              exit 1
            fi
          done

          tag="binaries-$(date -u +%Y%m%d)-$(printf '%.7s' "$OPENDAQ_SHA")"
          base_url="https://github.com/${{ github.repository }}/releases/download/$tag/"

          mkdir -p dist
          for runtime_dir in linux-x64 darwin-arm64 windows-x64; do
            tar -czf "dist/opendaq-bin-$runtime_dir.tar.gz" \
              -C "staged-artifacts/bin/$runtime_dir" .
          done
          (cd dist && sha256sum opendaq-bin-*.tar.gz > SHA256SUMS)

          {
            echo '//! Pinned release of the prebuilt native openDAQ libraries.'
            echo '//!'
            echo '//! Regenerated by the `build-native-binaries` GitHub Actions workflow -- do not'
            echo '//! edit by hand.  The archives carry the openDAQ core libraries, the flat C'
            echo '//! bindings library (`copendaq`), and the reference device / function block /'
            echo '//! streaming modules, built from the pinned openDAQ commit below.'
            echo
            echo '#![allow(dead_code)] // the repo/ref/sha constants document the pinned build'
            echo
            echo "pub const TAG: &str = \"$tag\";"
            echo "pub const BASE_URL: &str ="
            echo "    \"$base_url\";"
            echo "pub const OPENDAQ_REPO: &str = \"$OPENDAQ_REPO\";"
            echo "pub const OPENDAQ_REF: &str = \"$OPENDAQ_REF\";"
            echo "pub const OPENDAQ_SHA: &str = \"$OPENDAQ_SHA\";"
            echo
            echo '/// (platform directory name, archive file name, SHA-256 of the archive)'
            echo 'pub const ARCHIVES: &[(&str, &str, &str)] = &['
            for runtime_dir in linux-x64 darwin-arm64 windows-x64; do
              file="opendaq-bin-$runtime_dir.tar.gz"
              digest="$(sha256sum "dist/$file" | cut -d' ' -f1)"
              echo '    ('
              echo "        \"$runtime_dir\","
              echo "        \"$file\","
              echo "        \"$digest\","
              echo '    ),'
            done
            echo '];'
          } > src/native_manifest.rs

          cat src/native_manifest.rs
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create release with binary archives
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.pack.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes --cleanup-tag
          fi
          gh release create "$TAG" \
            --title "Native binaries $TAG" \
            --latest=false \
            --notes "openDAQ native libraries and modules built from ${{ needs.resolve-ref.outputs.repo }} @ ${{ needs.resolve-ref.outputs.value }} (${{ needs.resolve-ref.outputs.sha }}). Downloaded automatically by the opendaq crate's loader; not for manual installation." \
            dist/opendaq-bin-*.tar.gz dist/SHA256SUMS

      - name: Commit manifest and regenerated bindings
        shell: bash
        run: |
          cp -a staged-artifacts/generated/src/generated/. src/generated/
          cp staged-artifacts/generated/sys-generated.rs src/sys/generated.rs

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/native_manifest.rs src/generated src/sys/generated.rs

          if git diff --cached --quiet; then
            echo "No manifest or generated binding changes to commit."
            exit 0
          fi

          git commit -m "Pin native binaries release ${{ steps.pack.outputs.tag }}"
          git push origin "HEAD:${{ github.ref_name }}"
